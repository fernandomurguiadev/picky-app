description: >
  Toggle manual de apertura/cierre de tienda. Agrega columna `isManualOpen`
  (boolean nullable) a store_settings. null = seguir horario configurado,
  true = forzar apertura, false = forzar cierre. Nuevo endpoint PATCH
  /stores/me/status. Endpoint público GET /stores/:slug/status considera
  override antes de calcular por horario.
