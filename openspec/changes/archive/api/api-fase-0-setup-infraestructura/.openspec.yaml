description: >
  Setup completo del backend NestJS para el MVP de PickyApp.
  Cubre infraestructura base: TypeScript strict, Docker + PostgreSQL 16,
  TypeORM configurado, gestión de variables de entorno con Zod,
  y capa common/ con filtros, interceptors, guards y decorators.
