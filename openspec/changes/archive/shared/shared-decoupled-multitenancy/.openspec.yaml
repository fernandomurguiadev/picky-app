description: >
  Desacoplamiento de identidad multi-tenant. User pasa a ser global (sin
  tenantId); la relación User↔Tenant se gestiona via TenantMembership.
  Login emite JWT directo (1 tenant) o selectionToken efímero (N tenants).
  Nuevo endpoint POST /auth/select-tenant. Frontend con selector de tienda.
