notes: |
  Reconciliado en implementación con 3 commits paralelos del usuario
  (847e6c4a, 0499661b, 3a90cad3) que agregaron Swagger, cliente Orval y un
  class-serializer global por rol (@Expose({groups}) + TransformInterceptor) —
  se adoptó ese mecanismo como fuente única de verdad para ocultar
  costPrice/unitCost, reemplazando el whitelist manual original. Se corrigió
  un bug de casing en ese serializer ('ADMIN' vs 'admin' real del JWT) y el
  mutator de Orval (esperaba 1 arg, el cliente generado llama con 2).

  Pendiente post-archivado (acción del usuario, fuera del alcance del código):
  - Ejecutar `npm run migration:run` (migración ya generada: 1783905259807-Migration.ts).
  - Verificación manual en navegador: alta de producto con costo, pedido nuevo,
    panel de Rentabilidad visto como ADMIN y como STAFF.
